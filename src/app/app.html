<main class="container">
  <h1>{{ title() }}</h1>

  @if (loading()) {
    <p class="status">Loading forecast...</p>
  } @else if (error()) {
    <p class="status error">{{ error() }}</p>
  } @else {
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Temp (&deg;C)</th>
          <th>Temp (&deg;F)</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody>
        @for (forecast of forecasts(); track forecast.date) {
          <tr>
            <td>{{ forecast.date }}</td>
            <td>{{ forecast.temperatureC }}</td>
            <td>{{ forecast.temperatureF }}</td>
            <td>{{ forecast.summary }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</main>
